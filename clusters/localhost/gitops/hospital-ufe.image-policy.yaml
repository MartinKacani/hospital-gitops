apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: hospital-ufe
  namespace: wac-hospital-project
spec:
  imageRepositoryRef:
    name: hospital-ufe # referuje ImageRepository z predchádzajúceho kroku
  filterTags:
      pattern: "main.*" # vyberie všetky verzie, ktoré začínajú na main- (napr. main-20240315.1200)
  policy:
    alphabetical:
      order: asc