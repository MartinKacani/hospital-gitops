apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wac-hospital-project  # chceme tieto objekty umiestniť do `wac-hospital` namespace
                         # tento zapis preťaží hodnoty "namespace" vo všetkých objektoch
labels:
- pairs:
    app.kubernetes.io/part-of: wac-hospital-project

resources:
- ../../../apps/tjmk-hospital-ufe
- ../../../apps/tjmk-hospital-webapi

patches:
- path: patches/hospital-webapi.service.yaml

components:
- ../../../components/version-developers
- https://github.com/MartinKacani/hospital-webapi//deployments/kustomize/components/mongodb
